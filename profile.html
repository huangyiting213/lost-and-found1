<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — UKM Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-suitcase-lg-fill"></i> UKM Lost &amp; Found
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav.home">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="browse.html" data-i18n="nav.browse">Browse Items</a></li>
                    <li class="nav-item"><a class="nav-link" href="report-lost.html" data-i18n="nav.reportLost">Report Lost</a></li>
                    <li class="nav-item"><a class="nav-link" href="report-found.html" data-i18n="nav.reportFound">Report Found</a></li>
                    <li class="nav-item">
                        <button class="btn btn-sm btn-outline-light ms-lg-2" id="langToggle" type="button">中文</button>
                    </li>
                    <li class="nav-item d-none" id="guestMenu">
                        <a class="nav-link btn btn-warning text-dark px-3 ms-lg-2" href="login.html" data-i18n="nav.login">Login</a>
                    </li>
                    <li class="nav-item dropdown d-none" id="userMenu">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span id="userNameDisplay">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="my-posts.html" data-i18n="nav.myPosts">My Posts</a></li>
                            <li><a class="dropdown-item" href="profile.html" data-i18n="nav.profile">My Profile</a></li>
                            <li><a class="dropdown-item d-none" href="admin.html" id="adminLink" data-i18n="nav.admin">Admin Panel</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn" data-i18n="nav.logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h2 data-i18n="profile.title">My Profile</h2>
            <p class="text-muted" data-i18n="profile.subtitle">View and update your personal information</p>
        </div>

        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
        </div>

        <div id="profileCard" class="card shadow-sm d-none">
            <div class="card-body p-4">
                <form id="profileForm">
                    <div class="mb-3">
                        <label for="fullName" class="form-label" data-i18n="profile.fullName">Full Name</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label" data-i18n="profile.phone">Phone Number</label>
                        <input type="tel" class="form-control" id="phone">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label" data-i18n="profile.email">Email</label>
                        <input type="email" class="form-control" id="email" readonly disabled>
                        <small class="text-muted" data-i18n="profile.emailNote">Login email can't be changed here</small>
                    </div>
                    <div class="mb-4">
                        <label for="matricId" class="form-label" data-i18n="profile.matricId">Student / Matric ID</label>
                        <input type="text" class="form-control" id="matricId" readonly disabled>
                        <small class="text-muted" data-i18n="profile.matricNote">Matric ID can't be changed</small>
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="saveBtn">
                        <i class="bi bi-check-lg"></i> <span data-i18n="profile.save">Save Changes</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
