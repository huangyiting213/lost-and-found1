<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UKM Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-search"></i> UKM Lost & Found
            </a>
        </div>
    </nav>

    <section class="auth-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4 p-md-5">
                            <h2 class="text-center mb-4" data-i18n="register.title">Create an Account</h2>
                            
                            <div id="alertBox" class="alert d-none" role="alert"></div>
                            
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="register.fullName">Full Name</label>
                                    <input type="text" class="form-control" id="fullName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="register.matricId">Student / Matric ID</label>
                                    <input type="text" class="form-control" id="matricId" placeholder="e.g. A123456" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="register.email">UKM Email</label>
                                    <input type="email" class="form-control" id="email" placeholder="example@siswa.ukm.edu.my" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="register.password">Password</label>
                                    <input type="password" class="form-control" id="password" minlength="6" required>
                                    <small class="text-muted" data-i18n="register.passwordHint">At least 6 characters</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" data-i18n="register.phone">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone" placeholder="e.g. 0123456789" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 btn-lg" id="registerBtn"><span data-i18n="register.btn">Sign Up</span></button>
                                   
                                </button>
                            </form>
                            
                            <p class="text-center mt-3 mb-0">
                              <span data-i18n="register.haveAccount">Already have an account?</span> <a href="login.html" data-i18n="register.loginLink">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="js/register.js"></script>
</body>
</html>
