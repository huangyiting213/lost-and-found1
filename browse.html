<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Items - UKM Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-search"></i> UKM Lost & Found
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav.home">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="browse.html" data-i18n="nav.browse">Browse Items</a></li>
                    <li class="nav-item"><a class="nav-link" href="report-lost.html" data-i18n="nav.reportLost">Report Lost</a></li>
                    <li class="nav-item"><a class="nav-link" href="report-found.html" data-i18n="nav.reportFound">Report Found</a></li>
                    <li class="nav-item">
                        <button class="btn btn-sm btn-outline-light ms-lg-2" id="langToggle" type="button">中文</button>
                    </li>
                    <li class="nav-item d-none" id="guestMenu">
                        <a class="nav-link btn btn-warning text-dark px-3 ms-lg-2" href="login.html" data-i18n="nav.login">Login</a>
                    </li>
                    <li class="nav-item dropdown d-none" id="userMenu">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span id="userNameDisplay">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="my-posts.html" data-i18n="nav.myPosts">My Posts</a></li>
                            <li><a class="dropdown-item d-none" href="admin.html" id="adminLink" data-i18n="nav.admin">Admin Panel</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn" data-i18n="nav.logout">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-4 bg-light">
        <div class="container">
            <h1 class="mb-4" data-i18n="browse.title">Browse Items</h1>
            
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                                <input type="text" class="form-control" id="searchInput" placeholder="Search by keyword (title, description, location)..." data-i18n-placeholder="browse.searchPlaceholder">
                            </div>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label small text-muted mb-1" data-i18n="browse.type">Type</label>
                            <select class="form-select" id="filterType">
                                <option value="all" data-i18n="browse.allItems">All Items</option>
                                <option value="lost" data-i18n="browse.lostItems">Lost Items</option>
                                <option value="found" data-i18n="browse.foundItems">Found Items</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label small text-muted mb-1" data-i18n="browse.category">Category</label>
                            <select class="form-select" id="filterCategory">
                                <option value="all" data-i18n="browse.allCategories">All Categories</option>
                                <option value="Electronics" data-i18n="cat.electronics">Electronics</option>
                                <option value="ID & Cards" data-i18n="cat.idCards">ID & Cards</option>
                                <option value="Bags & Wallets" data-i18n="cat.bags">Bags & Wallets</option>
                                <option value="Keys" data-i18n="cat.keys">Keys</option>
                                <option value="Clothing" data-i18n="cat.clothing">Clothing & Accessories</option>
                                <option value="Books" data-i18n="cat.books">Books & Stationery</option>
                                <option value="Jewelry" data-i18n="cat.jewelry">Jewelry & Watches</option>
                                <option value="Other" data-i18n="cat.other">Other</option>
                            </select>
                        </div>
                        
                        <div class="col-md-4">
                            <label class="form-label small text-muted mb-1" data-i18n="browse.sortBy">Sort by</label>
                            <select class="form-select" id="filterSort">
                                <option value="newest" data-i18n="browse.newest">Newest First</option>
                                <option value="oldest" data-i18n="browse.oldest">Oldest First</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            
            <p class="text-muted" id="resultsCount" data-i18n="browse.loading">Loading...</p>
            
            <div class="row g-4" id="itemsContainer"></div>
            
            <div id="loadingSpinner" class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
            
            <div id="emptyState" class="text-center py-5 d-none">
                <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
                <h4 class="mt-3 text-muted" data-i18n="browse.noItems">No items found</h4>
                <p class="text-muted" data-i18n="browse.noItemsHint">Try adjusting your filters or search keywords.</p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/browse.js"></script>
</body>
</html>
