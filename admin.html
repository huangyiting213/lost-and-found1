<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - UKM Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-shield-lock"></i> UKM Lost & Found — Admin
            </a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light btn-sm"><i class="bi bi-house"></i> Back to Site</a>
                <a href="#" class="btn btn-outline-warning btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div id="accessChecking" class="text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">Verifying access...</p>
    </div>

    <div id="accessDenied" class="container text-center py-5 d-none">
        <i class="bi bi-shield-x text-danger" style="font-size: 4rem;"></i>
        <h3 class="mt-3">Access Denied</h3>
        <p class="text-muted">You do not have permission to view this page.</p>
        <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>

    <div id="adminContent" class="container py-4 d-none">
        <h1 class="mb-4">Admin Dashboard</h1>

        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <i class="bi bi-box-seam text-primary fs-2"></i>
                        <h3 class="mt-2 mb-0" id="statTotal">0</h3>
                        <small class="text-muted">Total Items</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <i class="bi bi-exclamation-circle text-danger fs-2"></i>
                        <h3 class="mt-2 mb-0" id="statLost">0</h3>
                        <small class="text-muted">Lost Items</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <i class="bi bi-check-circle text-success fs-2"></i>
                        <h3 class="mt-2 mb-0" id="statFound">0</h3>
                        <small class="text-muted">Found Items</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center shadow-sm border-0">
                    <div class="card-body">
                        <i class="bi bi-people text-info fs-2"></i>
                        <h3 class="mt-2 mb-0" id="statUsers">0</h3>
                        <small class="text-muted">Users</small>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#itemsTab">All Items</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#usersTab">All Users</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="itemsTab">
                <div class="table-responsive">
                    <table class="table table-hover align-middle bg-white shadow-sm">
                        <thead class="table-light">
                            <tr>
                                <th>Type</th><th>Title</th><th>Category</th><th>Location</th><th>Posted By</th><th>Status</th><th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div class="tab-pane fade" id="usersTab">
                <div class="table-responsive">
                    <table class="table table-hover align-middle bg-white shadow-sm">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th><th>Matric ID</th><th>Email</th><th>Phone</th><th>Role</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
